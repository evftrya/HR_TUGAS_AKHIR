<head>

    <title>Base64 Image Fixer</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a1a; /* Dark mode biar mata gak sakit */
            color: white;
        }
        .card {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .img-container {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        img {
            /* Trik agar gambar pecah terlihat lebih tajam/crisp */
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
            
            width: 350px; /* Atur ukuran di sini */
            height: auto;
            display: block;
        }
        .info {
            font-size: 14px;
            color: #aaa;
        }
    </style>
