<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Neon Gen Z</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<style>
    .pattern-mesh {
        background-color: #ffffff;
        background-image: 
            linear-gradient(to right, #f1f5f9 1px, transparent 1px),
            linear-gradient(to bottom, #f1f5f9 1px, transparent 1px);
        background-size: 40px 40px;
    }
</style>

<body class="pattern-mesh min-h-screen">
    <div class="fixed inset-0 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-50/50 via-transparent to-transparent"></div>
</body>
</html>
