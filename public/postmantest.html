<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini API Tester</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background-color: #252526;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h2 {
            margin-top: 0;
            color: #fff;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        select, input, textarea, button {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #3c3c3c;
            background-color: #3c3c3c;
            color: #fff;
            font-size: 14px;
        }
        select {
            width: 120px;
            font-weight: bold;
        }
        input[type="text"] {
            flex-grow: 1;
        }
        button {
            background-color: #007acc;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0098ff;
        }
        .form-section {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-section > div {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 13px;
        }
        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: 'Courier New', Courier, monospace;
        }
        .response-container {
            background-color: #1e1e1e;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            padding: 15px;
            min-height: 200px;
            overflow-x: auto;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #3c3c3c;
            font-weight: bold;
        }
        .status-success { color: #4CAF50; }
        .status-error { color: #F44336; }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', Courier, monospace;
            color: #9cdcfe;
        }
        .csrf-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            background: #2d2d2d;
            padding: 10px;
            border-radius: 4px;
            align-items: center;
            flex-wrap: wrap;
        }
        .csrf-group input[type="text"] {
            flex: 1;
            min-width: 180px;
        }
        .btn-success {
            background-color: #28a745;
        }
        .btn-success:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Mini API Tester</h2>

    <div class="input-group">
        <select id="method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="PATCH">PATCH</option>
            <option value="DELETE">DELETE</option>
        </select>
        <input type="text" id="url" placeholder="Masukkan URL API (contoh: https://jsonplaceholder.typicode.com/posts/1)" value="https://jsonplaceholder.typicode.com/posts/1">
        <button onclick="sendRequest()">Send</button>
    </div>

    <div class="csrf-group">
        <input type="text" id="csrf-header" placeholder="CSRF Header (contoh: X-CSRF-TOKEN)" value="X-CSRF-TOKEN">
        <input type="text" id="csrf-value" placeholder="Nilai CSRF Token">
        <button class="btn-success" onclick="autoDetectCsrf()">Auto-Detect Token</button>
        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 13px;">
            <input type="checkbox" id="with-credentials"> Kirim Cookies
        </label>
    </div>

    <div class="form-section">
        <div>
            <label for="headers">Headers (Format JSON)</label>
            <textarea id="headers" placeholder='{"Content-Type": "application/json"}'>{&#10;  "Content-Type": "application/json"&#10;}</textarea>
        </div>
        <div>
            <label for="body">Body (Format JSON/Text)</label>
            <textarea id="body" placeholder='Masukkan payload body di sini'></textarea>
        </div>
    </div>

    <h3>Response</h3>
    <div class="response-container">
        <div class="status-bar">
            <span id="status-text">Status: Menunggu request...</span>
            <span id="time-text">Waktu: - ms</span>
        </div>
        <pre id="response-body">// Hasil response akan muncul di sini</pre>
    </div>
</div>

<script>
    async function autoDetectCsrf() {
        const url = document.getElementById('url').value;
        if (!url) {
            alert('Masukkan URL terlebih dahulu untuk mendeteksi token!');
            return;
        }

        try {
            // Mengambil halaman tujuan terlebih dahulu untuk membaca token
            const response = await fetch(url, { method: 'GET' });
            if (!response.ok) {
                alert('Gagal mengambil data dari URL. Pastikan URL benar atau tidak diblokir CORS.');
                return;
            }

            const html = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            // Mencari meta tag yang biasa digunakan untuk menyimpan token CSRF
            const selectorList = [
                'meta[name="csrf-token"]',
                'meta[name="_token"]',
                'meta[name="csrf-param"]'
            ];

            let metaTag = null;
            for (const selector of selectorList) {
                metaTag = doc.querySelector(selector);
                if (metaTag) break;
            }

            if (metaTag) {
                document.getElementById('csrf-value').value = metaTag.getAttribute('content');
                alert('Token CSRF berhasil ditemukan dan dimasukkan ke form!');
            } else {
                alert('Token CSRF tidak ditemukan dalam HTML halaman ini. Anda mungkin perlu mengambil token secara manual melalui sumber halaman (View Source).');
            }
        } catch (e) {
            alert('Terjadi kesalahan saat mendeteksi: ' + e.message);
        }
    }

    async function sendRequest() {
        const url = document.getElementById('url').value;
        const method = document.getElementById('method').value;
        const headersStr = document.getElementById('headers').value;
        const bodyStr = document.getElementById('body').value;

        // CSRF inputs
        const csrfHeader = document.getElementById('csrf-header').value.trim();
        const csrfValue = document.getElementById('csrf-value').value.trim();
        const withCredentials = document.getElementById('with-credentials').checked;

        const statusText = document.getElementById('status-text');
        const timeText = document.getElementById('time-text');
        const responseBody = document.getElementById('response-body');

        if (!url) {
            alert('URL tidak boleh kosong!');
            return;
        }

        // Reset UI
        statusText.textContent = "Status: Loading...";
        statusText.className = "";
        timeText.textContent = "Waktu: - ms";
        responseBody.textContent = "";

        // Parsing Headers
        let headers = {};
        if (headersStr.trim() !== '') {
            try {
                headers = JSON.parse(headersStr);
            } catch (e) {
                alert("Format Headers harus JSON yang valid!");
                statusText.textContent = "Status: Error (Invalid Header JSON)";
                statusText.className = "status-error";
                return;
            }
        }

        // Masukkan CSRF Token jika sudah terdeteksi
        if (csrfHeader !== '' && csrfValue !== '') {
            headers[csrfHeader] = csrfValue;
        }

        // Konfigurasi fetch
        const options = {
            method: method,
            headers: headers
        };

        if (withCredentials) {
            options.credentials = 'include';
        }

        if (method !== 'GET' && method !== 'HEAD' && bodyStr.trim() !== '') {
            options.body = bodyStr;
        }

        try {
            const startTime = Date.now();
            const response = await fetch(url, options);
            const endTime = Date.now();

            // Set Status & Time
            const timeTaken = endTime - startTime;
            timeText.textContent = `Waktu: ${timeTaken} ms`;
            statusText.textContent = `Status: ${response.status} ${response.statusText}`;

            if (response.ok) {
                statusText.className = "status-success";
            } else {
                statusText.className = "status-error";
            }

            const contentType = response.headers.get("content-type");
            let data;

            if (contentType && contentType.includes("application/json")) {
                data = await response.json();
                responseBody.textContent = JSON.stringify(data, null, 4);
            } else {
                data = await response.text();
                responseBody.textContent = data;
            }

        } catch (error) {
            statusText.textContent = "Status: Network Error / CORS / Ditolak";
            statusText.className = "status-error";
            responseBody.textContent = "Gagal melakukan request. \n\nDetail Error: " + error.message + "\n\nKemungkinan penyebab:\n1. URL API salah atau server down.\n2. API memblokir request akibat kebijakan CORS.\n3. Token CSRF kadaluwarsa.";
        }
    }
</script>

</body>
</html>
