<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Report - Emergency Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @media print {
            @page { size: landscape; margin: 10mm; }
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-container { width: 100% !important; border: 1px solid #ccc !important; box-shadow: none !important; }
            table { font-size: 8px !important; width: 100% !important; }
            select { display: none !important; }
            .col-extra { display: none !important; }
        }

        .print-only { display: none; }
        .bg-status-sudah { background-color: #22c55e !important; color: white !important; }
        .bg-status-belum { background-color: #ef4444 !important; color: white !important; }
        .bg-status-bug { background-color: #eab308 !important; color: black !important; }
    </style>
</head>

<body class="bg-gray-50 font-sans p-4 md:p-8">

<div class="max-w-[1600px] mx-auto">

    <div class="print-only mb-4 border-b-2 border-gray-800 pb-2">
        <h1 class="text-xl font-bold text-black uppercase">Laporan Pengujian: Emergency Contact (Decision Table)</h1>
        <p class="text-xs" id="printDate"></p>
    </div>

    <div class="flex flex-wrap justify-between items-end gap-4 mb-6 no-print">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">Decision Table Testing</h1>
            <p class="text-sm text-gray-600 italic">Module: Emergency Contact Validation</p>
        </div>

        <div class="flex flex-wrap gap-2">
            <button onclick="toggleExtraColumns()" class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-2 rounded-lg text-xs font-medium transition shadow-md">
                👁️ Detail Unit Test
            </button>
            <button onclick="pickFile()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-xs font-medium transition shadow-md">
                📁 Sinkron JSON
            </button>
            <button onclick="exportCSV()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-lg text-xs font-medium transition shadow-md">
                📊 Export CSV
            </button>
            <button onclick="downloadImage()" class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-2 rounded-lg text-xs font-medium transition shadow-md">
                🖼️ Gambar
            </button>
            <button onclick="handlePrint()" class="bg-gray-800 hover:bg-black text-white px-3 py-2 rounded-lg text-xs font-medium transition shadow-md">
                🖨️ Print
            </button>
        </div>
    </div>

    <div id="captureArea" class="bg-white rounded-xl shadow-xl border border-gray-200 overflow-hidden print-container">
        <div class="overflow-x-auto">
            <table class="min-w-full text-[11px]">
                <thead>
                    <tr class="bg-slate-800 text-white">
                        <th class="px-2 py-3 text-left">Rule</th>
                        <th class="px-2 py-3 text-left">Nama Test Case</th>
                        <th class="px-2 py-3 text-left col-extra hidden">Unit Test Function</th>
                        <th class="px-1 py-3 text-center">Login</th>
                        <th class="px-1 py-3 text-center">Admin</th>
                        <th class="px-1 py-3 text-center">Owner</th>
                        <th class="px-1 py-3 text-center">SDM</th>
                        <th class="px-1 py-3 text-center">ID Reg</th>
                        <th class="px-2 py-3 text-center border-l border-slate-700">Status</th>
                        <th class="px-2 py-3 text-left col-extra hidden">Expected Result</th>
                        <th class="px-2 py-3 text-center">Feature</th>
                        <th class="px-2 py-3 text-center">UAT</th>
                        <th class="px-2 py-3 text-center">Port</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-200 text-gray-700"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const STORAGE_KEY = 'ZIDAN_DECISION_FINAL_V4';
let fileHandle = null;

const defaultData = [
    {rule:"R2A1", name:"Akses Tanpa Login", unit:"r2a1AksesTanpaLogin", login:false, admin:false, pemilik:false, sdm:false, id:null, expected:"kembali ke halaman login dengan pemberitahuan bahwa harus login terlebih dahulu", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A2", name:"Login Bukan Salah Satu Dari Admin Sdm Pemilik", unit:"r2a2LoginBukanSalahSatuDariAdminSdmPemilik", login:true, admin:false, pemilik:false, sdm:false, id:null, expected:"kembali ke halaman sebelumnya dengan pemberitahuan bahwa role saat ini tidak dapat mengakses halaman", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A3", name:"Login Staff Sdm Dengan Id Pegawai Tidak Terdaftar", unit:"r2a3LoginStaffSdmDenganIdPegawaiTidakTerdaftar", login:true, admin:false, pemilik:false, sdm:true, id:false, expected:"Kembali dengan kembali ke deashboard/halaman sebelumnya dengan pemberitahuan Pegawai belum terdaftar", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A4", name:"Login Staff Sdm Dengan Id Pegawai Terdaftar", unit:"r2a4LoginStaffSdmDenganIdPegawaiTerdaftar", login:true, admin:false, pemilik:false, sdm:true, id:true, expected:"Berhasil mengakses halaman emergency Contact", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A5", name:"Login Pemilik Data Dengan Id Pegawai Tidak Terdaftar", unit:"r2a5LoginPemilikDataDenganIdPegawaiTidakTerdaftar", login:true, admin:false, pemilik:true, sdm:false, id:false, expected:"kembali dengan kembali ke deashboard/halaman sebelumnya dengan pemberitahuan Pegawai belum terdaftar", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A6", name:"Login Pemilik Data Dengan Id Pegawai Terdaftar", unit:"r2a6LoginPemilikDataDenganIdPegawaiTerdaftar", login:true, admin:false, pemilik:true, sdm:false, id:true, expected:"Berhasil mengakses halaman emergency Contact", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A7", name:"Login Pemilik Data Dan Staff Sdm Dengan Id Pegawai Tidak Terdaftar", unit:"r2a7LoginPemilikDataDanStaffSdmDenganIdPegawaiTidakTerdaftar", login:true, admin:false, pemilik:true, sdm:true, id:false, expected:"kembali ke deashboard/halaman sebelumnya dengan pemberitahuan Pegawai belum terdaftar", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A8", name:"Login Pemilik Data Dan Staff Sdm Dengan Id Pegawai Terdaftar", unit:"r2a8LoginPemilikDataDanStaffSdmDenganIdPegawaiTerdaftar", login:true, admin:false, pemilik:true, sdm:true, id:true, expected:"Berhasil mengakses halaman emergency Contact", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A9", name:"Login Admin Dengan Id Pegawai Tidak Terdaftar", unit:"r2a9LoginAdminDenganIdPegawaiTidakTerdaftar", login:true, admin:true, pemilik:false, sdm:false, id:false, expected:"kembali ke deashboard/halaman sebelumnya dengan pemberitahuan Pegawai belum terdaftar", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A10", name:"Login Admin Dengan Id Pegawai Terdaftar", unit:"r2a10LoginAdminDenganIdPegawaiTerdaftar", login:true, admin:true, pemilik:false, sdm:false, id:true, expected:"Berhasil mengakses halaman emergency Contact", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A11", name:"Login Admin Dan Staff Sdm Dengan Id Pegawai Tidak Terdaftar", unit:"r2a11LoginAdminDanStaffSdmDenganIdPegawaiTidakTerdaftar", login:true, admin:true, pemilik:false, sdm:true, id:false, expected:"kembali ke deashboard/halaman sebelumnya dengan pemberitahuan Pegawai belum terdaftar", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A12", name:"Login Admin Dan Staff Sdm Dengan Id Pegawai Terdaftar", unit:"r2a12LoginAdminDanStaffSdmDenganIdPegawaiTerdaftar", login:true, admin:true, pemilik:false, sdm:true, id:true, expected:"Berhasil mengakses halaman emergency Contact", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A13", name:"Login Admin Dan Pemilik Data Dengan Id Pegawai Tidak Terdaftar", unit:"r2a13LoginAdminDanPemilikDataDenganIdPegawaiTidakTerdaftar", login:true, admin:true, pemilik:true, sdm:false, id:false, expected:"kembali ke deashboard/halaman sebelumnya dengan pemberitahuan Pegawai belum terdaftar", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A14", name:"Login Admin Dan Pemilik Data Dengan Id Pegawai Terdaftar", unit:"r2a14LoginAdminDanPemilikDataDenganIdPegawaiTerdaftar", login:true, admin:true, pemilik:true, sdm:false, id:true, expected:"Berhasil mengakses halaman emergency Contact", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A15", name:"Login Admin Pemilik Data Dan Staff Sdm Dengan Id Pegawai Tidak Terdaftar", unit:"r2a15LoginAdminPemilikDataDanStaffSdmDenganIdPegawaiTidakTerdaftar", login:true, admin:true, pemilik:true, sdm:true, id:false, expected:"kembali ke deashboard/halaman sebelumnya dengan pemberitahuan Pegawai belum terdaftar", feature_test:"belum", uat:"belum", portability:"belum"},
    {rule:"R2A16", name:"Login Admin Pemilik Data Dan Staff Sdm Dengan Id Pegawai Terdaftar", unit:"r2a16LoginAdminPemilikDataDanStaffSdmDenganIdPegawaiTerdaftar", login:true, admin:true, pemilik:true, sdm:true, id:true, expected:"Berhasil mengakses halaman emergency Contact", feature_test:"belum", uat:"belum", portability:"belum"}
];

let myDataJSON = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultData;

function toggleExtraColumns() {
    document.querySelectorAll('.col-extra').forEach(c => c.classList.toggle('hidden'));
}

async function pickFile() {
    try {
        [fileHandle] = await window.showOpenFilePicker({
            types: [{ description: 'JSON Files', accept: { 'application/json': ['.json'] } }],
        });
        const file = await fileHandle.getFile();
        myDataJSON = JSON.parse(await file.text());
        renderTable();
    } catch (err) {}
}

async function updateJSONValue(ruleCode, key, newValue, selectElement) {
    const item = myDataJSON.find(d => d.rule === ruleCode);
    if (item) {
        item[key] = newValue;
        selectElement.className = `w-full p-1 border rounded font-bold no-print bg-status-${newValue}`;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(myDataJSON));
        if (fileHandle) {
            const writable = await fileHandle.createWritable();
            await writable.write(JSON.stringify(myDataJSON, null, 2));
            await writable.close();
        }
    }
}

function handlePrint() {
    document.getElementById('printDate').innerText = "Waktu Cetak: " + new Date().toLocaleString('id-ID');
    window.print();
}

function exportCSV() {
    // Header CSV lengkap
    let csv = "\uFEFFRule,Nama Test Case,Unit Test Function,Login,Admin,Owner,SDM,ID Reg,Status,Expected Result,Feature Test,UAT,Portability\n";

    myDataJSON.forEach(d => {
        const isValid = (d.login && (d.admin || d.pemilik || d.sdm) && d.id === true);
        const statusText = isValid ? "Valid" : "Invalid";

        // Fungsi helper untuk konversi boolean ke simbol murni
        const getSym = (val) => {
            if(val === true) return "✓";
            if(val === false) return "✗";
            return "-";
        };

        const row = [
            `"${d.rule}"`,
            `"${d.name}"`,
            `"${d.unit}"`,
            `"${getSym(d.login)}"`,
            `"${getSym(d.admin)}"`,
            `"${getSym(d.pemilik)}"`,
            `"${getSym(d.sdm)}"`,
            `"${getSym(d.id)}"`,
            `"${statusText}"`,
            `"${d.expected}"`,
            `"${d.feature_test.toUpperCase()}"`,
            `"${d.uat.toUpperCase()}"`,
            `"${d.portability.toUpperCase()}"`
        ];
        csv += row.join(",") + "\n";
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Testing_Report_Emergency_${new Date().getTime()}.csv`;
    a.click();
}

function downloadImage() {
    html2canvas(document.getElementById('captureArea')).then(canvas => {
        const a = document.createElement('a');
        a.href = canvas.toDataURL("image/png");
        a.download = 'Report_Decision_Table.png'; a.click();
    });
}

function renderTable() {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";
    myDataJSON.forEach(d => {
        const isValid = (d.login && (d.admin || d.pemilik || d.sdm) && d.id === true);
        const getBadge = (val) => {
            if(val === true) return `<span class="text-green-600 font-bold">✓</span>`;
            if(val === false) return `<span class="text-red-500 font-bold">✗</span>`;
            return `<span class="text-gray-300">-</span>`;
        };

        tbody.innerHTML += `
            <tr class="hover:bg-gray-50">
                <td class="px-2 py-3 font-bold text-slate-800">${d.rule}</td>
                <td class="px-2 py-3 leading-tight">${d.name}</td>
                <td class="px-2 py-3 font-mono text-indigo-600 col-extra hidden">${d.unit}</td>
                <td class="px-1 py-3 text-center">${getBadge(d.login)}</td>
                <td class="px-1 py-3 text-center">${getBadge(d.admin)}</td>
                <td class="px-1 py-3 text-center">${getBadge(d.pemilik)}</td>
                <td class="px-1 py-3 text-center">${getBadge(d.sdm)}</td>
                <td class="px-1 py-3 text-center">${getBadge(d.id)}</td>
                <td class="px-2 py-3 text-center border-l font-bold ${isValid ? 'text-green-600' : 'text-red-500'}">${isValid?'Valid':'Invalid'}</td>
                <td class="px-2 py-3 text-[10px] italic col-extra hidden">${d.expected}</td>
                <td class="px-1 py-3">${createSelect(d.rule, 'feature_test', d.feature_test)}</td>
                <td class="px-1 py-3">${createSelect(d.rule, 'uat', d.uat)}</td>
                <td class="px-1 py-3">${createSelect(d.rule, 'portability', d.portability)}</td>
            </tr>
        `;
    });
}

function createSelect(rule, field, currentVal) {
    const options = ['belum', 'sudah', 'bug'];
    const colorClass = `bg-status-${currentVal}`;
    let html = `<select onchange="updateJSONValue('${rule}', '${field}', this.value, this)" class="w-full p-1 border rounded font-bold no-print ${colorClass}">`;
    options.forEach(opt => html += `<option value="${opt}" ${currentVal === opt ? 'selected' : ''} class="bg-white text-black">${opt.toUpperCase()}</option>`);
    html += `</select>`;
    let printColor = currentVal === 'sudah' ? 'text-green-600' : (currentVal === 'bug' ? 'text-yellow-600' : 'text-red-600');
    html += `<span class="hidden print:block font-bold uppercase text-[9px] ${printColor}">${currentVal}</span>`;
    return html;
}

renderTable();
</script>
</body>
</html>
